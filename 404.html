<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page not found | Sudip Ojha</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#05080f">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg"/>
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css"/>
  <script defer src="/js/script.js"></script>
</head>
<body>

  <div class="bg-fx" aria-hidden="true"></div>

  <main class="err-wrap">
    <div class="err-inner">
      <p class="err-code">404</p>

      <div class="terminal panel">
        <div class="terminal__bar">
          <span class="terminal__dot"></span><span class="terminal__dot"></span><span class="terminal__dot"></span>
          <span class="terminal__title">sudip@sydney — ~/portfolio</span>
        </div>
        <div class="terminal__body">
          <span class="t-line"><span class="t-prompt">❯</span><span class="t-cmd">cd ./requested-page</span></span>
          <span class="t-line t-out">bash: cd: ./requested-page: No such file or directory</span>
          <span class="t-line"><span class="t-prompt">❯</span><span class="t-cmd">suggest --fix</span></span>
          <span class="t-line t-out">try one of: <span class="t-ok">/home</span> · <span class="t-ok">/projects</span> · <span class="t-ok">/services</span> · <span class="t-ok">/contact</span></span>
          <span class="t-line"><span class="t-prompt">❯</span><span class="t-cursor"></span></span>
        </div>
      </div>

      <div class="cta-band__actions">
        <a href="/" class="btn btn--primary">Take me home <span class="arr">→</span></a>
        <a href="/contact.html" class="btn">Report a broken link</a>
      </div>
    </div>
  </main>

</body>
</html>
